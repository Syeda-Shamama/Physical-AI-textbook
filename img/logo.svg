<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- Book back shadow -->
  <rect x="10" y="12" width="36" height="42" rx="3" fill="#5b21b6"/>

  <!-- Book main cover -->
  <rect x="8" y="8" width="36" height="42" rx="3" fill="#7c3aed"/>

  <!-- Book spine -->
  <rect x="8" y="8" width="6" height="42" rx="2" fill="#6d28d9"/>

  <!-- Book pages (right side) -->
  <rect x="41" y="10" width="3" height="38" rx="1" fill="#ede9fe" opacity="0.6"/>

  <!-- Page lines -->
  <rect x="18" y="16" width="18" height="2" rx="1" fill="white" opacity="0.8"/>
  <rect x="18" y="21" width="14" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="18" y="26" width="16" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="18" y="31" width="12" height="2" rx="1" fill="white" opacity="0.6"/>

  <!-- AI chip badge -->
  <rect x="16" y="37" width="20" height="10" rx="2" fill="#a78bfa"/>
  <text x="26" y="45" text-anchor="middle" font-size="6.5" font-weight="bold" fill="white" font-family="Arial, sans-serif">AI</text>
</svg>
