<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Book back -->
  <rect x="5" y="4" width="20" height="24" rx="2" fill="#5b21b6"/>
  <!-- Book front -->
  <rect x="4" y="3" width="20" height="24" rx="2" fill="#7c3aed"/>
  <!-- Spine -->
  <rect x="4" y="3" width="4" height="24" rx="1.5" fill="#6d28d9"/>
  <!-- Pages right edge -->
  <rect x="22" y="5" width="2" height="20" rx="1" fill="#ede9fe" opacity="0.7"/>
  <!-- Lines -->
  <rect x="11" y="9" width="10" height="1.5" rx="0.75" fill="white" opacity="0.9"/>
  <rect x="11" y="13" width="8" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
  <rect x="11" y="17" width="9" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
  <!-- AI badge -->
  <rect x="9" y="21" width="12" height="5" rx="1.5" fill="#a78bfa"/>
  <text x="15" y="25.5" text-anchor="middle" font-size="4" font-weight="bold" fill="white" font-family="Arial">AI</text>
</svg>
